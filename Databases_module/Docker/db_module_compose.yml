services:
  #sudo docker exec -it mongodb_robust6g mongo -u admin -p admin123
  mongodb:
    image: mongo:4.4.29
    container_name: mongodb_robust6g
    profiles: ["db_module.mongodb"]
    environment:
      - TZ=${TZ}
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - ${PFD}/Results/mongo_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:${MONGO_PORT:-27017}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis_robust6g:
    image: redis:8.6.0
    container_name: redis_robust6g
    profiles: ["db_module.redis"]
    environment:
      - TZ=${TZ}
    command: >
      sh -c 'exec redis-server /usr/local/etc/redis/redis.conf
      --maxmemory-samples ${REDIS_MAXMEMORY_SAMPLES}
      --io-threads ${REDIS_IO_THREADS}
      --stream-node-max-bytes ${REDIS_STREAM_NODE_MAX_BYTES}
      --stream-node-max-entries ${REDIS_STREAM_NODE_MAX_ENTRIES}
      --maxclients ${REDIS_MAXCLIENTS}'
    #--requirepass ${REDIS_PASSWORD} -> first I need to configure the ACL Redis to create users
    volumes:
      - ${PFD}/Databases_module/Configuration_files/Redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ${PFD}/Results/Redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"] # default port is 6379
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G


  redis_worker:
    image: redis_worker_robust6g:latest
    build:
      context: ${PFD}
      dockerfile: Databases_module/Docker/Dockerfile/Worker_kafka_to_redis.dockerfile
    container_name: redis_worker_robust6g
    profiles: ["db_module.redis"]
    depends_on:
      redis_robust6g:
        condition: service_healthy
      kafka_robust6g:
        condition: service_healthy
    environment:
      - TZ=${TZ}
      # Kafka Configuration
      - KAFKA_BOOTSTRAP=${KAFKA_BOOTSTRAP}
      - KTRW_KAFKA_GROUP_ID=${KTRW_KAFKA_GROUP_ID}
      - KTRW_KAFKA_AUTO_OFFSET_RESET=${KTRW_KAFKA_AUTO_OFFSET_RESET}
      - KTRW_KAFKA_ENABLE_AUTO_COMMIT=${KTRW_KAFKA_ENABLE_AUTO_COMMIT}
      # Redis Configuration
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_USER=${REDIS_USER}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      # Stream Configuration
      - KTRW_REDIS_MAX_STREAM_LENGTH=${KTRW_REDIS_MAX_STREAM_LENGTH}
      - KTRW_REDIS_STREAM_TTL_SECONDS=${KTRW_REDIS_STREAM_TTL_SECONDS}
      # Topic Discovery Configuration
      - KTRW_KAFKA_TOPIC_REFRESH_INTERVAL=${KTRW_KAFKA_TOPIC_REFRESH_INTERVAL}
      # Memory Management Configuration
      - KTRW_REDIS_CLEANUP_INTERVAL=${KTRW_REDIS_CLEANUP_INTERVAL}
      - KTRW_REDIS_RETENTION_HOURS=${KTRW_REDIS_RETENTION_HOURS}
      - KTRW_REDIS_EMERGENCY_RETENTION_HOURS=${KTRW_REDIS_EMERGENCY_RETENTION_HOURS}
      - KTRW_REDIS_MEMORY_THRESHOLD=${KTRW_REDIS_MEMORY_THRESHOLD}
      # Kafka Topic Names
      - TELEGRAF_BASE_TOPIC=${TELEGRAF_BASE_TOPIC}
      - FLUENTD_SYSLOG_BASE_TOPIC=${FLUENTD_SYSLOG_BASE_TOPIC}
      - FLUENTD_SYSTEMD_BASE_TOPIC=${FLUENTD_SYSTEMD_BASE_TOPIC}
      - FALCO_BASE_TOPIC=${FALCO_BASE_TOPIC}
      - TSHARK_BASE_TOPIC=${TSHARK_BASE_TOPIC}
      - SNORT_KAFKA_TOPIC_OUT=${SNORT_KAFKA_TOPIC_OUT}
      - CIC_KAFKA_BASE_TOPIC_OUT=${CIC_KAFKA_BASE_TOPIC_OUT}
    restart: unless-stopped
    extra_hosts:
      - "${KAFKA_LAN_HOSTNAME:-kafka-host}:host-gateway"
    deploy:
      resources:
        limits:
          memory: 512M
