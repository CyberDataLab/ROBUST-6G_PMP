
# Optimized for high-throughput streaming with 6h retention and 2GB memory
# Some hardcoded parameters are modified at runtime because this file does not support environment variables.

# NETWORK
bind 0.0.0.0
protected-mode no
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300


# GENERAL
daemonize no
supervised no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile ""
databases 16

# Persistence
dir /data


# MEMORY MANAGEMENT
# Set maxmemory aligned with container limit (2GB). This prevents Redis OOM-kill and allows controlled memory management
maxmemory 2gb

# Using noeviction to prevent data loss
# The worker is actively responsible for cleaning up. Redis should not automatically delete data because it could cause incomplete streams.
maxmemory-policy noeviction

# LRU/LFU sampling (default: 5)
# Higher values = more accurate eviction (if policy was LRU/LFU)
# Keep at 5 since we use noeviction
maxmemory-samples 5


# PERSISTENCE (DO NOT LOSE DATA ON RESTART)

# Enable AOF (Append-Only File) for durability. This ensures data survives container restarts
appendonly yes
appendfilename "appendonly.aof"

# Balance durability vs performance
# everysec = fsync every second (good compromise)
appendfsync everysec

# Use RDB preamble for faster restarts
# AOF will start with an RDB snapshot + incremental changes
aof-use-rdb-preamble yes

# Auto-rewrite AOF to prevent it from growing forever
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Also keep RDB snapshots as backup
# Format: save <seconds> <changes>
save 900 1      # After 900s if at least 1 key changed
save 300 10     # After 300s if at least 10 keys changed
save 60 10000   # After 60s if at least 10000 keys changed
dbfilename dump.rdb


# PERFORMANCE TUNING

# Log slow queries (>10ms)
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency monitoring (100μs threshold)
latency-monitor-threshold 100

# Active rehashing (spread hash table rehashing across CPU time)
activerehashing yes

# Client output buffer limits
# Format: client-output-buffer-limit <class> <hard limit> <soft limit> <soft seconds>
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit pubsub 32mb 8mb 60
client-output-buffer-limit replica 256mb 64mb 60

# Lazy freeing (free memory in background threads)
# This prevents blocking on DEL commands with large keys
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

# Multi-threaded I/O (use 4 threads for network I/O)
io-threads 4
io-threads-do-reads yes


# DATA STRUCTURE OPTIMIZATION

# HyperLogLog sparse representation
hll-sparse-max-bytes 3000

# List compression
# -2 = compress lists with >8 elements (balance memory/CPU)
list-max-ziplist-size -2
list-compress-depth 0

# Set optimization
set-max-intset-entries 512

# Hash optimization
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# Sorted set optimization
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# These values are optimized for ~1000 messages per stream with 6h retention
stream-node-max-bytes 4096
stream-node-max-entries 100


# LIMITS

# Maximum number of clients
# We expect: API server + Worker + monitoring tools
maxclients 10000


# REPLICATION (Optional - for future HA setup)

# Uncomment if you want to set up replication later
# replicaof <masterip> <masterport>
# masterauth <master-password>
# replica-read-only yes


# SECURITY

# Password protection (currently disabled, set via environment if needed)
# requirepass <your-password>

# Disable dangerous commands in production (uncomment if needed)
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command CONFIG ""


# NOTES

# This configuration is optimized for:
# - High-throughput streaming (thousands of msgs/sec)
# - 6-hour data retention with active cleanup
# - 2GB memory limit with noeviction policy
# - Durability via AOF + RDB
# - Multi-threaded I/O for performance
#
# Memory management is handled by the worker (kafka_redis_worker.py):
# - Active cleanup every 5 minutes (messages >2h)
# - Emergency cleanup if memory >85% (messages >1h)
# - TTL of 6h on all keys (safety net)
