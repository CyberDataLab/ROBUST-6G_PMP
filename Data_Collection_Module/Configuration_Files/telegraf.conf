[agent]
  interval = "${TELEGRAF_GENERAL_INTERVAL}"
  round_interval = true
  skip_processors_after_aggregators = false

[global_tags]
  machine_id = "${MACHINE_ID}"

[[inputs.mem]]
  fieldinclude = ["total", "used", "available", "used_percent"]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

[[inputs.cpu]]
  percpu = false
  totalcpu = true

[[inputs.sensors]]
  #Temperature, humidity, voltage , fan, electric current, humidity
  remove_numbers = true
  fieldinclude = ["temp_*", "humidity_*", "in*", "fan*", "curr_*"]

[[inputs.internet_speed]]
  interval = "60s"
  memory_saving_mode = true
  connections = 1
  test_mode = "multi"

# Output configuration to Kafka
[[outputs.kafka]]
  brokers = ["${KAFKA_BOOTSTRAP}"]
  topic = "${TELEGRAF_BASE_TOPIC}" # Primero ${TELEGRAF_BASE_TOPIC} y luego cuando meta el cambio sería "${TELEGRAF_BASE_TOPIC}_${MACHINE_ID}"
  data_format = "json"

# Output configuration to Prometheus
[[outputs.prometheus_client]]
  listen = ":${TELEGRAF_TO_PROMETHEUS_PORT}"
  metric_version = 2