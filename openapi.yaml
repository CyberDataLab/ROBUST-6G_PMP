          description: "The end time of the data."
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: "YANG file containing selected data"
          content:
            application/yang:
              schema:
                type: string
                format: binary
              example: "historicalData.yang"
          headers:
            Content-Disposition:
              description: "The header indicates that the response is a downloadable YANG file."
              schema:
                type: string
                example: "attachment; filename=historicalData.yang"



                      
  /ConfigurationManagerThingsboard/collectDataFromThingsboard:
    post:
      tags: [ConfigurationManagerThingsboard]
      summary: Start continuous monitoring for one or multiple devices
      operationId: collectDataFromThingsboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectDataRequest"
      responses:
        "200":
          description: Successfully processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectDataResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Device(s) not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectNotFoundResponse"
        "429":
          description: Maximum number of concurrent devices reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ConfigurationManagerThingsboard/stopMonitoring:
    post:
      tags: [ConfigurationManagerThingsboard]
      summary: Stop monitoring for one or multiple devices
      operationId: stopMonitoring
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StopMonitoringRequest"
      responses:
        "200":
          description: Successfully processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopMonitoringResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ConfigurationManagerThingsboard/stopAllMonitoring:
    post:
      tags: [ConfigurationManagerThingsboard]
      summary: Stop monitoring for ALL active devices
      operationId: stopAllMonitoring
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StopAllMonitoringRequest"
      responses:
        "200":
          description: Successfully processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopAllMonitoringResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ConfigurationManagerThingsboard/monitoringStatus:
    get:
      tags: [ConfigurationManagerThingsboard]
      summary: Retrieve the status of monitored devices
      operationId: monitoringStatus
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringStatusResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /health:
    get:
      tags: [ConfigurationManagerThingsboard]
      summary: Service health check endpoint
      operationId: healthCheck
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

components:
  schemas:
    DataSource:
      type: object
      properties:
        toolName:
          type: string
          description: "The name of the tool."
        objetives:
          type: array
          description: "A objetives list of the data source."
          items:
            type: string
            description: "Each objetive."
        networkSegment:
          type: array
          description: "A list of network segments of the data source."
          items:
            type: string
            description: "Each network segment."

    Threshold:
      type: object
      properties:
        toolName:
          type: string
          description: "The name of the tool."
        policy:
          type: array
          description: "A list of policies for the threshold."
          items:
            $ref: "#/components/schemas/Policy"

    Policy:
      type: object
      properties:
        id:
          type: string
          description: "The id of the policy."
        policyType:
          type: string
          description: "The type of the policy."
          example: 
            - "Drop"
            - "Blocking"
            - "Blacklist"
            - "Whitelist"
        policyAction:
          type: string
          description: "The objetive of the policy."
          example:
            - "Block all traffic from a specific IP address."
            - "Drop all traffic from a specific Port."
            - "Allow all traffic from a specific NetworkSegment."
        policyObjetive:
          type: array
          items: 
            type: string
            description: "The objetive of the policy."
            example:
                - "IP"
                - "Port"
                - "Protocol"
                - "NetworkSegment"

    Tool:
      type: object
      properties:
        id:
          type: string
          description: "The id of the tool."
        name:
          type: string
          description: "The name of the tool."
        version:
          type: string
          description: "The version of the tool."
        toolType:
          type: string
        configuration:
          type: object
          description: "The configuration details for the tool."
          properties:
            configFile:
              type: string
              format: binary
              description: "The JSON configuration file for the tool."
    CollectDataRequest:
      type: object
      additionalProperties: false
      required:
        - thingsboardsIP
        - thingsboardPort
        - entityType
      properties:
        thingsboardsIP:
          type: string
          description: ThingsBoard server IP or hostname
        thingsboardPort:
          type: integer
          minimum: 1
          maximum: 65535
          description: ThingsBoard server port
        entityType:
          type: string
          default: DEVICE
          description: Entity type (typically DEVICE)
        entityId:
          type: string
          description: Single device ID (mutually exclusive with entityIds)
        entityIds:
          type: array
          minItems: 1
          description: Multiple device IDs (mutually exclusive with entityId)
          items:
            type: string
      oneOf:
        - required: [entityId]
          not:
            required: [entityIds]
        - required: [entityIds]
          not:
            required: [entityId]

    StopMonitoringRequest:
      type: object
      additionalProperties: false
      properties:
        entityId:
          type: string
          description: Single device ID
        entityIds:
          type: array
          minItems: 1
          description: Multiple device IDs
          items:
            type: string
      oneOf:
        - required: [entityId]
          not:
            required: [entityIds]
        - required: [entityIds]
          not:
            required: [entityId]

    StopAllMonitoringRequest:
      type: object
      additionalProperties: false
      required: [confirm]
      properties:
        confirm:
          type: boolean
          description: Must be true to confirm stopping all devices

    CollectDataResponse:
      type: object
      required: [message, summary, results]
      properties:
        message:
          type: string
        summary:
          $ref: "#/components/schemas/CollectSummary"
        results:
          type: array
          items:
            $ref: "#/components/schemas/CollectResultItem"

    CollectSummary:
      type: object
      additionalProperties: false
      required:
        - total
        - success
        - already_monitoring
        - canceled
        - errors
      properties:
        total:
          type: integer
        success:
          type: integer
        already_monitoring:
          type: integer
        canceled:
          type: integer
        errors:
          type: integer

    CollectResultItem:
      type: object
      additionalProperties: false
      required:
        - entity_id
        - status
        - message
      properties:
        entity_id:
          type: string
        status:
          type: string
          enum:
            - success
            - already_monitoring
            - error
            - canceled
        message:
          type: string
        kafka_topic:
          type: string
          description: Associated Kafka topic (when applicable)

    StopMonitoringResponse:
      type: object
      required: [message, summary, results]
      properties:
        message:
          type: string
        summary:
          $ref: "#/components/schemas/StopSummary"
        results:
          type: array
          items:
            $ref: "#/components/schemas/StopResultItem"

    StopAllMonitoringResponse:
      type: object
      required: [message, summary, results]
      properties:
        message:
          type: string
        summary:
          $ref: "#/components/schemas/StopSummary"
        results:
          type: array
          items:
            $ref: "#/components/schemas/StopResultItem"

    StopSummary:
      type: object
      additionalProperties: false
      required:
        - total
        - success
        - not_found
        - already_stopping
        - stopping
        - timeout
        - errors
      properties:
        total:
          type: integer
        success:
          type: integer
        not_found:
          type: integer
        already_stopping:
          type: integer
        stopping:
          type: integer
        timeout:
          type: integer
        errors:
          type: integer

    StopResultItem:
      type: object
      additionalProperties: false
      required:
        - entity_id
        - status
        - message
      properties:
        entity_id:
          type: string
        status:
          type: string
          enum:
            - success
            - not_found
            - already_stopping
            - stopping
            - timeout
            - error
        message:
          type: string
        kafka_topic:
          type: string
        warning:
          type: string
        statistics:
          $ref: "#/components/schemas/StopStatistics"

    StopStatistics:
      type: object
      additionalProperties: false
      required:
        - total_polls
        - total_alarms_sent
      properties:
        total_polls:
          type: integer
        total_alarms_sent:
          type: integer

    MonitoringStatusResponse:
      type: object
      required:
        - active_devices
        - max_devices
        - poll_interval_seconds
        - devices
      properties:
        active_devices:
          type: integer
        max_devices:
          type: integer
        poll_interval_seconds:
          type: integer
        devices:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/DeviceStatus"

    DeviceStatus:
      type: object
      required:
        - started_at
        - last_poll
        - is_alive
        - status
        - total_polls
        - total_alarms_sent
        - kafka_topic
        - config
      properties:
        started_at:
          type: string
          format: date-time
        last_poll:
          type: string
          nullable: true
          format: date-time
        is_alive:
          type: boolean
        status:
          type: string
          nullable: true
        total_polls:
          type: integer
        total_alarms_sent:
          type: integer
        kafka_topic:
          type: string
        config:
          type: object
          required:
            - thingsboardsIP
            - thingsboardPort
            - entityType
          properties:
            thingsboardsIP:
              type: string
            thingsboardPort:
              type: integer
            entityType:
              type: string

    HealthResponse:
      type: object
      required:
        - status
        - service
        - kafka_bootstrap
        - active_devices
        - alive_threads
        - monitor_threads_alive
        - orphan_monitor_threads
        - max_devices
      properties:
        status:
          type: string
        service:
          type: string
        kafka_bootstrap:
          type: string
        active_devices:
          type: integer
        alive_threads:
          type: integer
        monitor_threads_alive:
          type: integer
        orphan_monitor_threads:
          type: integer
        max_devices:
          type: integer

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    CollectNotFoundResponse:
      type: object
      required:
        - error
        - validation_errors
      properties:
        error:
          type: string
        validation_errors:
          type: array
          items:
            type: object
            required: [entity_id, error]
            properties:
              entity_id:
                type: string
              error:
                type: string