                    type: string
                    description: "Sigma rules generated from the SSLA by the Security Orchestrator."
              required:
                - podIP
                - toolName
                - sigma_rules
      responses:
        '200':
          description: OK

  /ConfigurationManager/DeployServiceTool: 
    post:
