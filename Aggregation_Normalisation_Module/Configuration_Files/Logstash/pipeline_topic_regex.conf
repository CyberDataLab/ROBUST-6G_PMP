input {
  kafka {
    bootstrap_servers => "${KAFKA_BOOTSTRAP}"
    topics_pattern => "^(${FLUENTD_SYSLOG_BASE_TOPIC}|${FLUENTD_SYSTEMD_BASE_TOPIC}|${FALCO_BASE_TOPIC}|${TELEGRAF_BASE_TOPIC})(_[a-z0-9]{64})?$" # Sería buena idea usar aquí también las variables de entorno de los topicos
    codec => "json"
    auto_offset_reset => "latest"
    group_id => "logstash_ingestor"
    decorate_events => "basic"
    #metadata => true # Use only as a debugger
  }
}

filter {

  mutate{
    add_field => {"[@metadata][local_fluentd_syslog_base_topic]" => "${FLUENTD_SYSLOG_BASE_TOPIC}"}
    add_field => {"[@metadata][local_fluentd_systemd_base_topic]" => "${FLUENTD_SYSTEMD_BASE_TOPIC}"}
    add_field => {"[@metadata][local_falco_base_topic]" => "${FALCO_BASE_TOPIC}"}
    add_field => {"[@metadata][local_fluentd_telegraf_base_topic]" => "${TELEGRAF_BASE_TOPIC}"}
  }

  if ! [kafka_topic] {
    mutate { add_field => { "kafka_topic" => "%{[@metadata][kafka][topic]}" } }
  }

  # Split generic topic like syslog_logs of the kafka_topic_base with the machine_id like syslog_logs_123asd...
  grok {
    match => {
      "kafka_topic" => "^(?<kafka_topic_base>${FLUENTD_SYSLOG_BASE_TOPIC}|${FLUENTD_SYSTEMD_BASE_TOPIC}|${FALCO_BASE_TOPIC}|${TELEGRAF_BASE_TOPIC})(?:_[a-z0-9]{64})?$"
    }
    tag_on_failure => []
  }

  # Fluentd
  if [kafka_topic_base] == [@metadata][local_fluentd_syslog_base_topic] or #FIXME si no funciona, usar en [@metadata][kafka][topic] en vez de kafka_topic
     [kafka_topic_base] == [@metadata][local_fluentd_systemd_base_topic] {
    grok {
      match => { "message" => "[^{]*(?<json_payload>\{.*)" }
    }

    json {
      source => "json_payload"
      target => "tmp_json_data"
      remove_field => ["json_payload", "message"] 
    }

    mutate {
      rename => { "[tmp_json_data][machine_id]" => "[host][id]" }
      rename => { "[tmp_json_data][host]" => "syslog_hostname" }
      rename => { "[tmp_json_data][message]" => "syslog_message" }
      rename => { "[tmp_json_data][priority]" => "syslog_priority" }
      rename => { "[tmp_json_data][syslog_identifier]" => "syslog_identifier" }
      rename => { "[tmp_json_data][pid]" => "[process][pid]" }
      rename => { "[tmp_json_data][comm]" => "[process][name]" }
    }
    
    mutate { remove_field => ["tmp_json_data"] }

    mutate {
      add_field => { "[event][module]" => "system" }
      add_field => { "[event][dataset]" => "%{kafka_topic_base}" }
    }
  }

  # Falco
  else if [kafka_topic_base] == [@metadata][local_falco_base_topic] {
    json {
      source => "message"
      target => "tmp_falco"
    }

    mutate {
      rename => { "[tmp_falco][output_fields][machine_id]" => "[host][id]" }
      rename => { "[tmp_falco][hostname]" => "falco_hostname" }
    }
    
    ruby {
        code => '
            event.get("tmp_falco").each do |k, v|
                event.set(k, v) unless k == "hostname"
            end
        '
    }
    mutate { remove_field => ["tmp_falco", "message", "hostname"] }

    mutate {
      add_field => { "[event][module]" => "falco" }
      add_field => { "[event][dataset]" => "alert" }
    }
  }

  # Telegraf
  else if [kafka_topic_base] == [@metadata][local_fluentd_telegraf_base_topic] {
    
    if [event][original] {
        json {
            source => "[event][original]"
            target => "telegraf_clean_data"
        }
    }
    
    mutate {
        rename => { "[telegraf_clean_data][tags][machine_id]" => "[host][id]" }
        rename => { "[telegraf_clean_data][tags][host]" => "[host][name]" }
        rename => { "[telegraf_clean_data][name]" => "[event][dataset]" }
    }

    mutate {
        rename => { "[telegraf_clean_data][tags]" => "telegraf_tags" }
    }

    mutate {
        remove_field => ["telegraf_clean_data", "_tags", "tags", "_tagsparsefailure"]
        add_field => { "[event][module]" => "telegraf" }
    }
  }


  date {
    match => [ "timestamp", "ISO8601", "UNIX", "UNIX_MS" ]
    target => "@timestamp"
  }
}

output {
  opensearch {
    hosts => ["https://${OPENSEARCH_HOST}:${OPENSEARCH_REST_API_PORT}"] #port 9200
    index => "logs-%{kafka_topic_base}-%{+YYYY.MM.dd}"
    user => "admin"
    password => "${OPENSEARCH_PASSWORD}"
    ssl => true
    ssl_certificate_verification => false
  }
}
