  discovery-agent:
    image: discovery_agent_robust6g:latest
    build:
      context: ${PFD}
      dockerfile: Aggregation_Normalisation_Module/Docker/Dockerfiles/discovery_agent.dockerfile
    container_name: discovery_agent_robust6g
    profiles: ["aggregation_module.prometheus"] #Same profile because Prometheus needs this microservice
    environment:
      - DISCOVERY_AGENT_SCAN_PORT=${DISCOVERY_AGENT_SCAN_PORT:-9999}
      - DISCOVERY_AGENT_SCAN_TIMEOUT=${DISCOVERY_AGENT_SCAN_TIMEOUT}
      - TZ=${TZ}
      - DISCOVERY_AGENT_PORT=${DISCOVERY_AGENT_PORT:-8100}
    network_mode: "${NETWORK_MODE}"
    volumes:
      - ${PFD}/Aggregation_Normalisation_Module/Scripts:/opt/discovery
    restart: unless-stopped

  init-opensearch:
    image: busybox:latest
    container_name: init_opensearch
    profiles: ["aggregation_module.opensearch"]
    network_mode: "${NETWORK_MODE}"
    command: sh -c "chown -R 1000:1000 /usr/share/opensearch/data"
    volumes:
      - ${PFD}/Results/opensearch_data:/usr/share/opensearch/data
    restart: "no"

  opensearch:
    image: opensearchproject/opensearch:3.4.0
    container_name: opensearch_node_robust6g
    profiles: ["aggregation_module.opensearch"]
    depends_on:
      init-opensearch:
        condition: service_completed_successfully
    environment:
      - cluster.name=${OPENSEARCH_CLUSTER_NAME}
      - node.name=${OPENSEARCH_NODE_NAME}
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD}
    network_mode: "${NETWORK_MODE}"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ${PFD}/Results/opensearch_data:/usr/share/opensearch/data
    ports:
      - "${OPENSEARCH_REST_API_PORT:-9200}:9200"
      - "${OPENSEARCH_ANALYSER_PORT:-9600}:9600"
    restart: unless-stopped

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.4.0
    container_name: opensearch_dashboards_robust6g
    profiles: ["aggregation_module.opensearch"]
    ports:
      - "${OPENSEARCH_DASHBOARD_PORT:-5601}:5601"
    environment:
      - 'OPENSEARCH_HOSTS=["https://${OPENSEARCH_HOST:-opensearch-host}:${OPENSEARCH_REST_API_PORT:-9200}"]'
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:-}
    network_mode: "${NETWORK_MODE}"
    depends_on:
      - opensearch
    restart: unless-stopped

  logstash:
    image: opensearchproject/logstash-oss-with-opensearch-output-plugin:8.9.0
    container_name: logstash_robust6g
    profiles: ["aggregation_module.opensearch"]
    volumes:
      - ${PFD}/Aggregation_Normalisation_Module/Configuration_Files/Logstash/pipeline.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    environment:
      - "LS_JAVA_OPTS=-Xmx256m -Xms256m"
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
      - OPENSEARCH_HOST=${OPENSEARCH_HOST:-opensearch-host}
      - OPENSEARCH_REST_API_PORT=${OPENSEARCH_REST_API_PORT:-9200}
      - TELEGRAF_BASE_TOPIC=${TELEGRAF_BASE_TOPIC}
      - FLUENTD_SYSLOG_BASE_TOPIC=${FLUENTD_SYSLOG_BASE_TOPIC}
      - FLUENTD_SYSTEMD_BASE_TOPIC=${FLUENTD_SYSTEMD_BASE_TOPIC}
      - FALCO_BASE_TOPIC=${FALCO_BASE_TOPIC}
      - KAFKA_BOOTSTRAP=${KAFKA_BOOTSTRAP}
    network_mode: "${NETWORK_MODE}"
    extra_hosts:
      # The default value is not valid. "kafka-host" is used as a placeholder for the Kafka address,
      # which should be specified using its FQDN. Docker does not support empty default values for some of its functions,
      # and hard-coding a default FQDN is not recommended.
      - "${KAFKA_LAN_HOSTNAME:-kafka-host}:host-gateway"
    depends_on:
      - opensearch
    restart: unless-stopped

volumes:
  prometheus_data: