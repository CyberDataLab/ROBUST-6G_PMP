services:



# They will be used when all the environment variables had been activated
  init-prometheus-config:
    image: busybox:latest
    container_name: init_prometheus_config
    profiles: ["aggregation_module.prometheus"]
    environment:
      - DISCOVERY_AGENT_PORT=${DISCOVERY_AGENT_PORT:-8100}
    volumes:
      - ${PFD}/Aggregation_Normalisation_Module/Configuration_Files/Prometheus/prometheus.yml.tmpl:/tmpl/prometheus.yml.tmpl:ro
      - ${PFD}/Aggregation_Normalisation_Module/Configuration_Files/Prometheus/generated:/out
    command: sh -c 'sed "s|\${DISCOVERY_AGENT_PORT:-8100}|$DISCOVERY_AGENT_PORT|g" /tmpl/prometheus.yml.tmpl > /out/prometheus.yml'
    restart: "no"
  
  prometheus:
    image: prom/prometheus:v3.8.0
    container_name: prometheus_server_robust6g
    profiles: ["aggregation_module.prometheus"]
    depends_on:
      init-prometheus:
        condition: service_completed_successfully
      init-prometheus-config:
        condition: service_completed_successfully
      discovery-agent:
        condition: service_started
    environment:
      - TZ=${TZ}
    extra_hosts:
      - "discovery-agent:host-gateway"
    volumes:
         #Mounting prometheus template with the environment variable expended
      - ${PFD}/Aggregation_Normalisation_Module/Configuration_Files/Prometheus/prometheus.yml.tmpl:/etc/prometheus/prometheus.yml.tmpl:ro
      - ${PFD}/Aggregation_Normalisation_Module/Configuration_Files/Prometheus/generated:/etc/prometheus/generated:ro
      - ${PFD}/Aggregation_Normalisation_Module/Configuration_Files/Prometheus/rules:/etc/prometheus/rules:ro
      - ${PFD}/Results/prometheus_data:/prometheus
    command:
      # CAMBIO: ahora apunta al generado
      - "--config.file=/etc/prometheus/generated/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:${PROMETHEUS_PORT:-9090}"
    restart: unless-stopped

